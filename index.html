<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat Sequencer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="circles">
        <div class="circle" id="circle1"></div>
        <div class="circle" id="circle2"></div>
        <div class="circle" id="circle3"></div>
        <div class="circle" id="circle4"></div>
        <div class="circle" id="circle5"></div>
        <div class="circle" id="circle6"></div>
        <div class="circle" id="circle7"></div>
        <div class="circle" id="circle8"></div>
        <div class="circle" id="circle9"></div>
        <div class="circle" id="circle10"></div>
        <div class="circle" id="circle11"></div>
        <div class="circle" id="circle12"></div>
        <div class="circle" id="circle13"></div>
        <div class="circle" id="circle14"></div>
        <div class="circle" id="circle15"></div>
        <div class="circle" id="circle16"></div>
    </div>
    <button id="toggleButton">Start</button>
    <div>
        <label for="bpmSlider">BPM: <span id="bpmValue">120</span></label>
        <input type="range" id="bpmSlider" min="10" max="500" value="60">
    </div>    <div>
        <label for="errorBound">Error Bound (ms): <span id="errorValue">100</span></label>
        <input type="range" id="errorBound" min="10" max="500" value="100">
    </div>
    <div id="feedback">
        <div id="noteFeedback">Note: <span id="noteDiff">--</span>ms <div id="noteBar"></div></div>
        <div id="quarterFeedback">Quarter: <span id="quarterDiff">--</span>ms <div id="quarterBar"></div></div>
        <div id="halfFeedback">Half: <span id="halfDiff">--</span>ms <div id="halfBar"></div></div>
    </div>    <script src="script.js"></script>
</body>
</html>
