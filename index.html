<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat Sequencer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="circles">
        <div class="circle" id="circle1"></div>
        <div class="circle" id="circle2"></div>
        <div class="circle" id="circle3"></div>
        <div class="circle" id="circle4"></div>
        <div class="circle" id="circle5"></div>
        <div class="circle" id="circle6"></div>
        <div class="circle" id="circle7"></div>
        <div class="circle" id="circle8"></div>
        <div class="circle" id="circle9"></div>
        <div class="circle" id="circle10"></div>
        <div class="circle" id="circle11"></div>
        <div class="circle" id="circle12"></div>
        <div class="circle" id="circle13"></div>
        <div class="circle" id="circle14"></div>
        <div class="circle" id="circle15"></div>
        <div class="circle" id="circle16"></div>
        <div id="feedback">
            <div id="wholeFeedback" class="feedback-row">
                <div class="row-label">Whole</div>
                <div class="row-values">
                    <span class="diff-text" id="wholeDiff">--</span>
                    <div class="feedback-bar" id="wholeBar"></div>
                </div>
            </div>
            <div id="quarterFeedback" class="feedback-row">
                <div class="row-label">Quarter</div>
                <div class="row-values">
                    <span class="diff-text" id="quarterDiff">--</span>
                    <div class="feedback-bar" id="quarterBar"></div>
                </div>
            </div>
            <div id="halfFeedback" class="feedback-row">
                <div class="row-label">Half</div>
                <div class="row-values">
                    <span class="diff-text" id="halfDiff">--</span>
                    <div class="feedback-bar" id="halfBar"></div>
                </div>
            </div>
        </div>
    </div>
    <button id="toggleButton">Start</button>

    <div class="sliders-container">
        <div class="slider-row">
            <label for="bpmSlider">BPM</label>
            <input type="range" id="bpmSlider" min="10" max="500" value="60">
            <span id="bpmValue">60</span>
        </div>
        <div class="slider-row">
            <label for="errorBound">Hit Margin (ms)</label>
            <input type="range" id="errorBound" min="10" max="500" value="100">
            <span id="errorValue">100</span>
        </div>
        <div class="slider-row">
            <label for="colorBound">Color Range (ms)</label>
            <input type="range" id="colorBound" min="10" max="600" value="300">
            <span id="colorValue">300</span>
        </div>
    </div>
    <div id="controls">
        <div class="control-group">
            <label><input type="checkbox" id="showWhole" checked> Show Whole</label>
            <select id="wholeDisplay">
                <option value="both">Both</option>
                <option value="ms">MS only</option>
                <option value="color">Color only</option>
                <option value="none">None</option>
            </select>
        </div>
        <div class="control-group">
            <label><input type="checkbox" id="showQuarter" checked> Show Quarter</label>
            <select id="quarterDisplay">
                <option value="both">Both</option>
                <option value="ms">MS only</option>
                <option value="color">Color only</option>
                <option value="none">None</option>
            </select>
        </div>
        <div class="control-group">
            <label><input type="checkbox" id="showHalf" checked> Show Half</label>
            <select id="halfDisplay">
                <option value="both">Both</option>
                <option value="ms">MS only</option>
                <option value="color">Color only</option>
                <option value="none">None</option>
            </select>
        </div>
    </div>
    <div id="statsPanel">
        <button id="statsButton">Show Stats</button>
        <div id="statsText"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
